name: openadmet_models
channels:

  - defaults
dependencies:
    # Base depends
  - python >= 3.12
  - pip

  - numpy
  - pandas
  - scikit-learn
  - rich
  - intake
  - joblib
  - zarr >=3.0.0

  - rdkit
  - molfeat
  - datamol
  - mordredcommunity
  - lightgbm
  - seaborn
  - splito
  - umap-learn
  - modal
  - chemprop >= 2.1.1
  - pytorch-gpu
  - pytorch-lightning
  - cudatoolkit
  - wandb
  - statsmodels
  - mdanalysis

  # mtenn
  - pytorch_geometric
  - pytorch_cluster
  - pytorch_scatter
  - pytorch_sparse
  - h5py
  - e3nn
  - ase

    # Testing
  - pytest
  - pytest-cov
  - codecov

    # Pip-only installs
  - pip:
    - phx-class-registry
    - email-validator
    - git+https://github.com/OpenADMET/mtenn.git@remove_dgl
   # - git+https://github.com/choderalab/mtenn.git@main
