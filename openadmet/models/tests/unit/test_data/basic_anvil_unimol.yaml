metadata:
  version: "v1"
  driver: "pytorch"
  name: "unimol-cyp3a4-classification"
  build_number: 1
  description: "A UniMol model for CYP3A4 classification"
  tag: "unimol-v1-classification"
  authors: "Yuzhi Xu"
  email: "yuzhixuchem@gmail.com"
  biotargets: ["CYP3A4"]
  tags: ["UniMol", "CYP3A4", "classification"]

data:
  type: "intake"
  resource: openadmet/models/tests/unit/test_data/CYP3A4_chembl_pchembl.csv
  input_col: CANONICAL_SMILES
  target_cols:
    - active

procedure:
  model:
    type: UniMolModel
    params:
      task: "classification"
      data_type: "molecule"
      epochs: 10
      batch_size: 16
      metrics: "auc"
      model_name: "unimolv1"  # unimolv1 or unimolv2
      model_size: "84m"       # 84m, 164m, 310m, 570m, 1.1B (for unimolv2)
      remove_hs: false
