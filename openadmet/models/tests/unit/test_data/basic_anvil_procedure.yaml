feat:
  type: FingerprintFeaturizer
  params:
    fp_type: ecfp:4

model:
  type: LGBMRegressorModel
  params:
    alpha: 0.15
    learning_rate: 0.1

split:
  type: ShuffleSplitter
  params:
    random_state: 42
    test_size: 0.2
    train_size: 0.8

train:
  type: SKLearnBasicTrainer
  params: {}
