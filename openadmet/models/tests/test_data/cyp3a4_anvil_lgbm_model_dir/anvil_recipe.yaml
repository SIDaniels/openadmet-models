data:
  anvil_dir: file:///store/projects/OpenADMET_WORK/initial_runs/CYP3A4_cross_val
  cat_entry: null
  input_col: OPENADMET_SMILES
  resource: cyp3a4_chembl_permissive.csv
  target_col: pchembl_value_mean
  type: intake
metadata:
  authors: Hugo M-O
  biotargets:
  - CYP3A4
  build_number: 0
  description: basic regression with combined fingerprint and descriptor features
    using LGBM
  driver: sklearn
  email: hugo.macdermott-opeskin@omsf.io
  name: CYP3A4_pchembl_testing_lgbm
  tag: openadmet-CYP3A4-pchembl-regression-testing-cv
  tags:
  - CYP3A4
  - openadmet
  - test
  - pchembl
  version: v1
procedure:
  feat:
    params:
      featurizers:
        DescriptorFeaturizer:
          descr_type: mordred
        FingerprintFeaturizer:
          fp_type: ecfp:6
    type: FeatureConcatenator
  model:
    params:
      mod_params:
        alpha: 0.005
        learning_rate: 0.05
    type: LGBMRegressorModel
  split:
    params:
      random_state: 42
      test_size: 0.3
      train_size: 0.7
    type: ShuffleSplitter
  train:
    params:
      param_grid:
        alpha:
        - 0.005
        learning_rate:
        - 0.05
        n_estimators:
        - 500
    type: SKLearnGridSearchTrainer
report:
  eval:
  - params: {}
    type: RegressionMetrics
  - params:
      axes_labels:
      - True pChEMBL
      - Predicted pChEMBL
      max_val: 10
      min_val: 3
      pXC50: true
      title: CYP3A4 True vs Predicted pChEMBL on test set
    type: RegressionPlots
  - params:
      axes_labels:
      - True pChEMBL
      - Predicted pChEMBL
      max_val: 10
      min_val: 3
      n_repeats: 5
      n_splits: 5
      pXC50: true
      random_state: 42
      title: CYP3A4 True vs Predicted pChEMBL on test set
    type: SKLearnRepeatedKFoldCrossValidation
